
<!DOCTYPE html>
<html lang="en">
 <head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width", initial-scale=1.0">
 <title>To-Do List Life Dashboard</title>
<link rel="stylesheet"
href="css/style.css">
  </head>

 <body>
<h1 id="greeting">Good Morning</h1>
<p id="date"></p>
<h2 id="clock">00:00:00<h2>
 
 <main>
	<section>
<section id="timer">
	<h2>Focus Timer</h2>
	<h3 id="countdown">59:00<h3>
	
	<button id="StartBtn">Start</button>
	<button id="StopBtn">Stop</button>
	<button id="ResetBtn">Reset</button>
</section>

<section id="todo">
	<h2>To-do List</h2>

<input 
	type="text"
	id="TaskInput"
	placeholder="Add New Task">

<button id="Add Task">add</button>
<ul id="tasklist"></ul>
</section>

 <section id="links">
	<h2>Quick Links</h2>
	
	<input
 type="text"
 id="LinkName"
 placeholder="Website Name">
	
	<input
 type="url"
 id="linkURL"
 placeholder="https://">

<button id="SaveLink">Save Link</button>

 <div id="LinkContainer"></div>

 </section>

</main>

<script src="js/script.js"></script>

</body>
</html>
